<script>
  // Theme toggle — single-button cycle Auto → Light → Dark → Auto.
  // The FOUC script in head.html has already applied data-theme to <html>;
  // this script wires up the click handler, syncs labels, swaps the meta
  // theme-color tag, and pushes setConfig messages to the giscus iframe
  // when comments are mounted.
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;

    var ORDER = ['auto', 'light', 'dark'];
    var STORAGE_KEY = 'theme-preference';
    var THEME_COLORS = { light: '#fefcf8', dark: '#16110d' };

    // i18n: rendered at build time from _data/strings.yml for the current
    // language. JSON.stringify via Liquid's `jsonify` filter keeps quote
    // escaping correct across all 4 languages.
    var TOOLTIP = {
      auto:  {{ t.topbar.theme_title.auto  | jsonify }},
      light: {{ t.topbar.theme_title.light | jsonify }},
      dark:  {{ t.topbar.theme_title.dark  | jsonify }}
    };
    var ARIA = {
      auto:  {{ t.topbar.theme_aria.auto  | jsonify }},
      light: {{ t.topbar.theme_aria.light | jsonify }},
      dark:  {{ t.topbar.theme_aria.dark  | jsonify }}
    };

    // Runtime origin (not Liquid's site.url) so the URL works on dev /
    // preview hosts as well as production zhgchg.li. giscus's iframe at
    // giscus.app loads the CSS via the user's browser, which can reach
    // any host the user can reach (including localhost).
    var GISCUS_LIGHT = window.location.origin + '/assets/css/giscus.css';
    var GISCUS_DARK  = window.location.origin + '/assets/css/giscus-dark.css';

    var mq = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

    function getCurrent() {
      var t = document.documentElement.dataset.theme;
      return (t === 'light' || t === 'dark' || t === 'auto') ? t : 'auto';
    }

    function effectiveScheme(theme) {
      if (theme === 'light') return 'light';
      if (theme === 'dark')  return 'dark';
      return mq && mq.matches ? 'dark' : 'light';
    }

    // theme-color drives mobile chrome. In auto mode we restore the dual
    // <meta media=...> tags so the OS handles flips natively; otherwise
    // a single fixed tag locks the chrome to the chosen scheme.
    function updateMetaThemeColor(theme) {
      var head = document.head;
      head.querySelectorAll('meta[name="theme-color"]').forEach(function (m) { m.remove(); });
      if (theme === 'auto') {
        ['light', 'dark'].forEach(function (mode) {
          var m = document.createElement('meta');
          m.name = 'theme-color';
          m.media = '(prefers-color-scheme: ' + mode + ')';
          m.content = THEME_COLORS[mode];
          head.appendChild(m);
        });
      } else {
        var m = document.createElement('meta');
        m.name = 'theme-color';
        m.content = THEME_COLORS[theme];
        head.appendChild(m);
      }
    }

    function syncGiscus(theme) {
      var iframe = document.querySelector('iframe.giscus-frame');
      if (!iframe || !iframe.contentWindow) return;
      var url = effectiveScheme(theme) === 'dark' ? GISCUS_DARK : GISCUS_LIGHT;
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: url } } },
        'https://giscus.app'
      );
    }

    function setTheme(t) {
      document.documentElement.dataset.theme = t;
      try { localStorage.setItem(STORAGE_KEY, t); } catch (_) {}
      btn.setAttribute('title', TOOLTIP[t]);
      btn.setAttribute('aria-label', ARIA[t]);
      updateMetaThemeColor(t);
      syncGiscus(t);
    }

    btn.addEventListener('click', function () {
      var cur = getCurrent();
      setTheme(ORDER[(ORDER.indexOf(cur) + 1) % ORDER.length]);
    });

    // Initial labels — FOUC script already applied data-theme; just refresh chips.
    var initial = getCurrent();
    btn.setAttribute('title', TOOLTIP[initial]);
    btn.setAttribute('aria-label', ARIA[initial]);

    // System scheme flip while in auto: re-push giscus theme. The dual
    // theme-color meta tags handle their own swap via media= so no need.
    if (mq) {
      var onMqChange = function () { if (getCurrent() === 'auto') syncGiscus('auto'); };
      if (mq.addEventListener) mq.addEventListener('change', onMqChange);
      else if (mq.addListener) mq.addListener(onMqChange);
    }

    // First message from giscus → guarantees the iframe is reachable;
    // re-push current theme as a safety net in case the initial bake-in
    // (in giscus.html) raced with the FOUC script. Idempotent.
    window.addEventListener('message', function (e) {
      if (e.origin !== 'https://giscus.app') return;
      if (e.data && e.data.giscus) syncGiscus(getCurrent());
    });
  })();
</script>
<script>
  (function () {
    var btn = document.getElementById('menu-btn');
    var drawer = document.getElementById('drawer');
    var overlay = document.getElementById('drawer-overlay');
    var closeBtn = document.getElementById('drawer-close');
    if (!btn || !drawer || !overlay) return;
    function open() {
      drawer.classList.add('open');
      overlay.classList.add('open');
      overlay.hidden = false;
      drawer.setAttribute('aria-hidden', 'false');
      btn.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
      btn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
      setTimeout(function () { overlay.hidden = true; }, 300);
    }
    btn.addEventListener('click', open);
    overlay.addEventListener('click', close);
    if (closeBtn) closeBtn.addEventListener('click', close);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && drawer.classList.contains('open')) close();
    });
  })();
</script>
<script>
  // Language switcher dropdown + browser-language hint
  (function () {
    // Map a navigator preference (e.g. "zh-TW", "en-US", "ja") to one of the
    // site's language codes. Pure "zh" is intentionally unmatched — ambiguous
    // between Hant/Hans, and we'd rather show nothing than guess wrong.
    function matchPref(pref, items) {
      var p = (pref || '').toLowerCase();
      if (!p) return null;
      var primary = p.split('-')[0];
      // Chinese: require a region/script subtag to disambiguate.
      if (primary === 'zh') {
        if (p === 'zh') return null;
        var hans = /(^|-)(cn|sg|hans)(-|$)/.test(p);
        var hant = /(^|-)(tw|hk|mo|hant)(-|$)/.test(p);
        for (var i = 0; i < items.length; i++) {
          var iso = (items[i].getAttribute('hreflang') || '').toLowerCase();
          if (hans && iso.indexOf('zh-hans') === 0) return items[i];
          if (hant && iso.indexOf('zh-hant') === 0) return items[i];
        }
        return null;
      }
      // Non-Chinese: match by primary subtag against item hreflang.
      for (var j = 0; j < items.length; j++) {
        var iso2 = (items[j].getAttribute('hreflang') || '').toLowerCase();
        if (iso2 === p || iso2.split('-')[0] === primary) return items[j];
      }
      return null;
    }

    document.querySelectorAll('[data-lang-switcher]').forEach(function (root) {
      var trig = root.querySelector('.lang-trigger');
      var menu = root.querySelector('.lang-menu');
      if (!trig || !menu) return;
      var hint = root.querySelector('.lang-hint');
      var hintText = root.querySelector('.lang-hint-text');
      var hintClose = root.querySelector('.lang-hint-close');
      var dot = root.querySelector('.lang-dot');
      var current = root.getAttribute('data-current') || '';

      function close() { menu.hidden = true; trig.classList.remove('open'); trig.setAttribute('aria-expanded', 'false'); }
      function open() {
        menu.hidden = false; trig.classList.add('open'); trig.setAttribute('aria-expanded', 'true');
        // Opening the menu acknowledges the hint — hide it for this match.
        hideHint(true);
      }
      function hideHint(persist) {
        if (!hint) return;
        hint.hidden = true;
        if (dot) dot.hidden = true;
        if (persist && hint.dataset.target) {
          try { localStorage.setItem('lang-hint-dismissed:' + hint.dataset.target, '1'); } catch (_) {}
        }
      }

      trig.addEventListener('click', function (e) {
        e.stopPropagation();
        if (menu.hidden) open(); else close();
      });
      document.addEventListener('click', function (e) { if (!root.contains(e.target)) close(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });

      // ---- Browser-language hint ----
      if (!hint || !hintText) return;
      var prefs = (navigator.languages && navigator.languages.length)
        ? navigator.languages : (navigator.language ? [navigator.language] : []);
      if (!prefs.length) return;
      var items = root.querySelectorAll('.lang-item');
      var match = null;
      for (var i = 0; i < prefs.length; i++) {
        match = matchPref(prefs[i], items);
        if (match) break;
      }
      if (!match) return;
      var targetCode = match.getAttribute('data-code');
      if (!targetCode || targetCode === current) return;
      try {
        if (localStorage.getItem('lang-hint-dismissed:' + targetCode)) return;
      } catch (_) {}

      var label = match.getAttribute('data-label') || targetCode;
      // Use the *matched* language's strings so the prompt is in a tongue
      // the visitor actually reads — showing a Chinese hint to an English
      // visitor would be self-defeating.
      var tmpl = match.getAttribute('data-suggest') || '{lang}';
      var dismissLabel = match.getAttribute('data-dismiss') || '';
      hintText.textContent = tmpl.replace('{lang}', label);
      if (hintClose && dismissLabel) hintClose.setAttribute('aria-label', dismissLabel);
      hint.dataset.target = targetCode;
      hint.hidden = false;
      if (dot) dot.hidden = false;

      // Click anywhere on the hint (except the close button) jumps to the
      // matched language using the menu link's href — so it inherits the
      // per-page translation routing already computed by Liquid.
      hint.addEventListener('click', function (e) {
        if (hintClose && hintClose.contains(e.target)) return;
        try { localStorage.setItem('lang-hint-dismissed:' + targetCode, '1'); } catch (_) {}
        window.location.href = match.href;
      });
      if (hintClose) {
        hintClose.addEventListener('click', function (e) {
          e.stopPropagation();
          hideHint(true);
        });
      }
    });
  })();
</script>
<script>
  // LQIP hydrator: paint the low-quality placeholder as a CSS background
  // behind every <img lqip="data:..."> so layout is reserved and there's a
  // pleasant pre-fill while the real (often webp) image downloads.
  (function () {
    var imgs = document.querySelectorAll('img[lqip]');
    if (!imgs.length) return;
    imgs.forEach(function (img) {
      var lqip = img.getAttribute('lqip');
      if (!lqip) return;
      img.style.backgroundImage = 'url("' + lqip + '")';
      img.style.backgroundSize = 'cover';
      img.style.backgroundPosition = 'center';
      // After the real image loads (or if it was cached), drop the bg to
      // avoid a stale cream rectangle behind transparent PNGs.
      var clear = function () { img.style.backgroundImage = ''; };
      if (img.complete && img.naturalWidth > 0) clear();
      else img.addEventListener('load', clear, { once: true });
    });
  })();
</script>
{%- if site.google_analytics -%}
<script>
  // Track link clicks to GA4: sends `click` event with link URL/domain and an
  // `outbound` flag. Uses capture phase so it fires even when other handlers
  // stopPropagation, and covers middle-click / cmd-click via `auxclick`.
  (function () {
    if (typeof window.gtag !== 'function') return;
    function handler(e) {
      var a = e.target && e.target.closest && e.target.closest('a[href]');
      if (!a) return;
      var href = a.getAttribute('href');
      if (!href || href.charAt(0) === '#' || href.indexOf('javascript:') === 0) return;
      var url;
      try { url = new URL(a.href, window.location.href); } catch (_) { return; }
      var outbound = url.host !== window.location.host;
      gtag('event', 'click', {
        link_url: url.href,
        link_domain: url.host,
        link_text: (a.innerText || a.textContent || '').trim().slice(0, 100),
        outbound: outbound
      });
    }
    document.addEventListener('click', handler, true);
    document.addEventListener('auxclick', handler, true);
  })();
</script>

<script>
  (function () {
    var bar = document.querySelector('#reading-progress > span');
    var article = document.querySelector('article');
    if (!bar || !article) return;
    var ticking = false;
    function compute() {
      var rect = article.getBoundingClientRect();
      var total = rect.height - window.innerHeight;
      var scrolled = -rect.top;
      var pct = total > 0 ? Math.max(0, Math.min(1, scrolled / total)) : 0;
      bar.style.width = (pct * 100).toFixed(2) + '%';
      ticking = false;
    }
    function onScroll() {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(compute);
    }
    compute();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
  })();
</script>
{%- endif -%}
