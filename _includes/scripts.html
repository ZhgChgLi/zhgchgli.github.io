<script>
  (function () {
    var btn = document.getElementById('menu-btn');
    var drawer = document.getElementById('drawer');
    var overlay = document.getElementById('drawer-overlay');
    var closeBtn = document.getElementById('drawer-close');
    if (!btn || !drawer || !overlay) return;
    function open() {
      drawer.classList.add('open');
      overlay.classList.add('open');
      overlay.hidden = false;
      drawer.setAttribute('aria-hidden', 'false');
      btn.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
      btn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
      setTimeout(function () { overlay.hidden = true; }, 300);
    }
    btn.addEventListener('click', open);
    overlay.addEventListener('click', close);
    if (closeBtn) closeBtn.addEventListener('click', close);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && drawer.classList.contains('open')) close();
    });
  })();
</script>
<script>
  // Language switcher dropdown
  (function () {
    document.querySelectorAll('[data-lang-switcher]').forEach(function (root) {
      var trig = root.querySelector('.lang-trigger');
      var menu = root.querySelector('.lang-menu');
      if (!trig || !menu) return;
      function close() { menu.hidden = true; trig.classList.remove('open'); trig.setAttribute('aria-expanded', 'false'); }
      function open() { menu.hidden = false; trig.classList.add('open'); trig.setAttribute('aria-expanded', 'true'); }
      trig.addEventListener('click', function (e) {
        e.stopPropagation();
        if (menu.hidden) open(); else close();
      });
      document.addEventListener('click', function (e) { if (!root.contains(e.target)) close(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    });
  })();
</script>
<script>
  // LQIP hydrator: paint the low-quality placeholder as a CSS background
  // behind every <img lqip="data:..."> so layout is reserved and there's a
  // pleasant pre-fill while the real (often webp) image downloads.
  (function () {
    var imgs = document.querySelectorAll('img[lqip]');
    if (!imgs.length) return;
    imgs.forEach(function (img) {
      var lqip = img.getAttribute('lqip');
      if (!lqip) return;
      img.style.backgroundImage = 'url("' + lqip + '")';
      img.style.backgroundSize = 'cover';
      img.style.backgroundPosition = 'center';
      // After the real image loads (or if it was cached), drop the bg to
      // avoid a stale cream rectangle behind transparent PNGs.
      var clear = function () { img.style.backgroundImage = ''; };
      if (img.complete && img.naturalWidth > 0) clear();
      else img.addEventListener('load', clear, { once: true });
    });
  })();
</script>
{%- if site.google_analytics -%}
<script>
  // Track link clicks to GA4: sends `click` event with link URL/domain and an
  // `outbound` flag. Uses capture phase so it fires even when other handlers
  // stopPropagation, and covers middle-click / cmd-click via `auxclick`.
  (function () {
    if (typeof window.gtag !== 'function') return;
    function handler(e) {
      var a = e.target && e.target.closest && e.target.closest('a[href]');
      if (!a) return;
      var href = a.getAttribute('href');
      if (!href || href.charAt(0) === '#' || href.indexOf('javascript:') === 0) return;
      var url;
      try { url = new URL(a.href, window.location.href); } catch (_) { return; }
      var outbound = url.host !== window.location.host;
      gtag('event', 'click', {
        link_url: url.href,
        link_domain: url.host,
        link_text: (a.innerText || a.textContent || '').trim().slice(0, 100),
        outbound: outbound
      });
    }
    document.addEventListener('click', handler, true);
    document.addEventListener('auxclick', handler, true);
  })();
</script>
{%- endif -%}

<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js" defer></script>
<script>
  (function () {
    var bar = document.querySelector('#reading-progress > span');
    var article = document.querySelector('article');
    if (!bar || !article) return;
    var ticking = false;
    function compute() {
      var rect = article.getBoundingClientRect();
      var total = rect.height - window.innerHeight;
      var scrolled = -rect.top;
      var pct = total > 0 ? Math.max(0, Math.min(1, scrolled / total)) : 0;
      bar.style.width = (pct * 100).toFixed(2) + '%';
      ticking = false;
    }
    function onScroll() {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(compute);
    }
    compute();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
  })();
</script>
{%- endif -%}
