name: After Pages Deployment

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build & Deploy Jekyll site to GitHub Pages"]
    types: [completed]

concurrency:
  group: "zhgchgli-after-pages-deploy"
  cancel-in-progress: true

jobs:
  after_deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Sync redirects to Cloudflare rules list
        env:
          CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          CLOUDFLARE_LIST_ID: "${{ secrets.CLOUDFLARE_LIST_ID }}"
          CLOUDFLARE_TOKEN: "${{ secrets.CLOUDFLARE_TOKEN }}"
          CLOUDFLARE_REDIRECT_JSON_URL: "${{ secrets.CLOUDFLARE_REDIRECT_JSON_URL }}"
        run: |
          set -euo pipefail

          curl -fsSL "${CLOUDFLARE_REDIRECT_JSON_URL}" | jq '
            to_entries
            | map({
                redirect: {
                  source_url: ("https://zhgchg.li" + .key),
                  target_url: (
                    if (.value | startswith("http"))
                    then .value
                    else "https://zhgchg.li" + .value
                    end
                  ),
                  status_code: 301
                }
              })
          ' > payload.json

          api_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/rules/lists/${CLOUDFLARE_LIST_ID}/items"

          # PUT to Cloudflare; print body, return HTTP status as the function exit code so
          # callers can branch on it. Any non-2xx returns its numeric code (e.g. 500),
          # network failures return 0 to fall through to the retry path.
          push() {
            local body status
            body="$(curl -sS -X PUT "$api_url" \
              -H "Authorization: Bearer ${CLOUDFLARE_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @payload.json \
              -w $'\n%{http_code}' || true)"
            status="$(printf '%s' "$body" | tail -n1)"
            printf '%s\n' "$body" | sed '$d'
            return "${status:-0}"
          }

          # success when HTTP 2xx AND body has `success: true`. echo body for the log.
          attempt() {
            local out rc
            out="$(push)"; rc=$?
            echo "$out"
            if [[ "$rc" =~ ^2[0-9][0-9]$ ]] && echo "$out" | jq -e '.success == true' >/dev/null 2>&1; then
              return 0
            fi
            return "$rc"
          }

          if attempt; then
            exit 0
          fi
          rc=$?

          echo "::warning::Cloudflare sync first attempt failed (HTTP $rc) — retrying in 5s"
          sleep 5
          if attempt; then
            exit 0
          fi
          rc=$?

          # Persistent failure — log a warning annotation and exit 0 so the workflow
          # is not marked failed (the redirects list keeps its previous state).
          echo "::warning::Cloudflare sync still failing after retry (HTTP $rc) — leaving the rules list unchanged"
          exit 0
