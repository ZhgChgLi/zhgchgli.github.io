name: Build & Deploy Jekyll site to GitHub Pages

# This repository deploys ONE language to its own custom domain.
# Set the language for *this repo's* deployment via the `DEPLOY_LANG` env below.
# To run additional languages, fork the repo (or push to additional repos)
# and change `DEPLOY_LANG`. Each language has its own _config.<lang>.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lang:
        description: "Language code (zh-tw, zh-cn, en, jp)"
        required: false
        default: ""
  # Sibling workflows (e.g. ZMediumToMarkdown) push commits with the default
  # GITHUB_TOKEN, which does NOT fire `on: push` (anti-recursion guard).
  # Listen for their completion instead.
  workflow_run:
    workflows: ["ZMediumToMarkdown"]
    types: [completed]
    branches: [main]
  # Daily rebuild at 10:00 Asia/Taipei (UTC+8) = 02:00 UTC.
  schedule:
    - cron: '0 2 * * *'

env:
  DEPLOY_LANG: zh-tw

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip when the upstream ZMediumToMarkdown run failed/was cancelled.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve language
        id: lang
        run: |
          lang="${{ github.event.inputs.lang }}"
          if [[ -z "$lang" ]]; then lang="${DEPLOY_LANG}"; fi
          echo "lang=$lang" >> "$GITHUB_OUTPUT"
          echo "→ Building language: $lang"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/configure-pages@v5
        id: pages

      - name: Fetch stats JSON (top7 / top30 / total)
        env:
          STATS_BASE: https://script.google.com/macros/s/AKfycbxYdtKSRD4DtVCWngh63_FzILDtL6sL--IVXF0HUFbjSTmL3gUgWKHfMDVQj7vq9hoK/exec
        run: |
          set -euo pipefail
          for api in top7 top30 total; do
            echo "→ fetching $api"
            curl -fsSL --retry 3 --retry-delay 2 -o "$api.json" "$STATS_BASE?api=$api"
          done

      - name: Fetch ads stats JSON (for /ads/ page)
        env:
          ADS_STATS_URL: https://script.google.com/macros/s/AKfycbw1TowznLUc09sz-Ach6iK0yUwFGyRWF-wBYAKZjlIoNI92bsVTtA7hOtVHLzjrP30Ldg/exec
        run: |
          set -euo pipefail
          if [[ -z "${ADS_STATS_URL}" ]]; then
            echo "ADS_STATS_URL secret not set — skipping (page will use last-committed _data/ads_stats.json)"
            exit 0
          fi
          echo "→ fetching ads stats"
          curl -fsSL --retry 3 --retry-delay 2 -o _data/ads_stats.json "${ADS_STATS_URL}?api=stats"

      - name: Commit fetched stats JSON back to repo
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add top7.json top30.json total.json _data/ads_stats.json
          if git diff --cached --quiet; then
            echo "no stats changes to commit"
          else
            git commit -m "chore: refresh stats JSON (top7/top30/total + ads)"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Build with bin/lang
        env:
          JEKYLL_ENV: production
        run: |
          ./bin/lang "${{ steps.lang.outputs.lang }}" build \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # After zh-tw deploys successfully, fan out a repository_dispatch event to
  # every shell repo so they rebuild against the latest master content.
  # vars.SHELL_REPOS is a JSON array of "owner/repo" strings stored as a
  # GitHub Actions variable (skip the job entirely if not configured).
  # secrets.GH_TOKEN must be a fine-grained PAT with `Contents: write` /
  # `Actions: write` scope on each shell repo.
  notify-shells:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ vars.SHELL_REPOS != '' }}
    steps:
      - name: Trigger shell-repo rebuilds
        env:
          SHELL_REPOS: ${{ vars.SHELL_REPOS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          for repo in $(echo "$SHELL_REPOS" | jq -r '.[]'); do
            echo "→ dispatch master-updated → $repo"
            gh api "repos/$repo/dispatches" \
              -f event_type=master-updated \
              -F 'client_payload[ref]=${{ github.sha }}'
          done
