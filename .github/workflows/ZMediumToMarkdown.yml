name: ZMediumToMarkdown
on:
  workflow_dispatch:
  schedule:
    - cron: "10 1 15 * *" # At 01:10 on day-of-month 15.

permissions:
  contents: write

concurrency:
  group: zmedium-to-markdown
  cancel-in-progress: false

jobs:
  ZMediumToMarkdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install ZMediumToMarkdown
        run: gem install ZMediumToMarkdown

      # ZMediumToMarkdown writes into ./_posts/zmediumtomarkdown/. Stage the
      # current zh-tw masters there first so the CLI only fetches diffs.
      - name: Stage zh-tw posts into _posts/
        run: |
          mkdir -p ./_posts/zmediumtomarkdown/
          if [[ -d ./L10n/posts/zh-tw/zmediumtomarkdown ]]; then
            shopt -s nullglob dotglob
            files=( ./L10n/posts/zh-tw/zmediumtomarkdown/* )
            if (( ${#files[@]} )); then
              mv "${files[@]}" ./_posts/zmediumtomarkdown/
            fi
          fi

      - name: Update unlisted posts
        env:
          MEDIUM_HOST: ${{ secrets.MEDIUM_HOST }}
          MEDIUM_HOST_SECRET: ${{ secrets.MEDIUM_HOST_SECRET }}
        run: |
          if [[ ! -f unlist.txt ]]; then
            echo "❌ unlist.txt not found in repo root"
            exit 1
          fi
          command -v ZMediumToMarkdown >/dev/null || { echo "❌ ZMediumToMarkdown not in PATH"; exit 1; }

          # Strip CR, trim, skip blank/comment lines, then fetch each unlisted slug.
          sed 's/\r$//' unlist.txt \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | awk 'NF && $0 !~ /^[[:space:]]*#/' \
            | while IFS= read -r line; do
                echo "▶ ZMediumToMarkdown --jekyll -p '$line'"
                ZMediumToMarkdown --jekyll -p "$line" \
                  --cookie_uid "${{ secrets.MEDIUM_COOKIE_UID }}" \
                  --cookie_sid "${{ secrets.MEDIUM_COOKIE_SID }}"
              done

      - name: Fetch latest posts
        env:
          MEDIUM_HOST: ${{ secrets.MEDIUM_HOST }}
          MEDIUM_HOST_SECRET: ${{ secrets.MEDIUM_HOST_SECRET }}
        run: |
          ZMediumToMarkdown --jekyll -u zhgchgli \
            --cookie_uid "${{ secrets.MEDIUM_COOKIE_UID }}" \
            --cookie_sid "${{ secrets.MEDIUM_COOKIE_SID }}"

      - name: Move fetched posts back to L10n/posts/zh-tw/
        run: |
          mkdir -p ./L10n/posts/zh-tw/zmediumtomarkdown/
          shopt -s nullglob dotglob
          files=( ./_posts/zmediumtomarkdown/* )
          if (( ${#files[@]} )); then
            mv "${files[@]}" ./L10n/posts/zh-tw/zmediumtomarkdown/
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: tools/translators/requirements.txt

      - name: Install translator dependencies
        run: pip install -r tools/translators/requirements.txt

      - name: Optimize photos (webp + photos.json)
        run: python tools/translators/optimize_photos.py

      - name: Generate SEO metadata
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python tools/translators/seo_maker.py

      - name: Generate AIO FAQ metadata
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python tools/translators/aio_maker.py

      - name: Translate (en, jp, zh-cn) and unify tags
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python tools/translators/translator.py en
          python tools/translators/translator.py jp
          python tools/translators/translator_cn.py
          ./bin/unify-tags

      - name: Generate SEO metadata (en, jp) from translated frontmatter
        run: |
          python tools/translators/seo_maker.py en
          python tools/translators/seo_maker.py jp

      - name: Generate AIO FAQ metadata (en, jp)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python tools/translators/aio_maker.py en
          python tools/translators/aio_maker.py jp

      - name: Commit and push fetched posts
        run: |
          set -e
          git config user.name  "ZMediumToMarkdown"
          git config user.email "zhgchgli@gmail.com"

          git add L10n assets
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Update fetched posts." \
            --author="ZMediumToMarkdown <zhgchgli@gmail.com>"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
