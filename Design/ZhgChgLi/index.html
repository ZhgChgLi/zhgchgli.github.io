<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>ZhgChgLi · Magazine Redesign</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="styles/shared.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" referrerpolicy="no-referrer" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
    body { font-family: "Noto Sans TC", -apple-system, system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="shared/sample-data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="directions/direction-a.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function PageRouter({ initialPage }) {
      const [page, setPage] = useState(initialPage);
      const props = {
        page,
        onNav: setPage,
        posts: window.BLOG_POSTS,
        categories: window.BLOG_CATEGORIES,
        tags: window.BLOG_TAGS,
        archives: window.BLOG_ARCHIVES,
      };
      if (page === "home") return <window.DirectionA.HomeA {...props} />;
      if (page === "list") return <window.DirectionA.PostListA {...props} />;
      if (page === "post") return <window.DirectionA.PostA {...props} />;
      if (page === "category") return <window.DirectionA.CategoryA {...props} />;
      if (page === "tag") return <window.DirectionA.TagA {...props} />;
      if (page === "archive") return <window.DirectionA.ArchiveA {...props} />;
      if (page === "search") return <window.DirectionA.SearchA {...props} />;
      if (page === "notfound") return <window.DirectionA.NotFoundA {...props} />;
      return null;
    }

    function Screen({ initialPage, w = 1280, h = 1600 }) {
      return (
        <div data-scroll-root style={{ width: w, height: h, overflow: "auto", background: "var(--cream-100)", position: "relative" }}>
          <PageRouter initialPage={initialPage} />
        </div>
      );
    }

    const PAGES_A = [
      ["home", "Home · 首頁"],
      ["list", "Writing · 文章列表"],
      ["post", "Essay · 單篇文章"],
      ["category", "Categories · 分類"],
      ["tag", "Tags · 標籤"],
      ["archive", "Archive · 歸檔"],
      ["search", "Search · 搜尋"],
      ["notfound", "404 · 找不到頁面"],
    ];

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="dir-a"
            title="Direction A · Gallery"
            subtitle="編輯雜誌風 — 大圖、襯線粗體、暖米白；首頁雙欄圖文卡 + Hero"
          >
            {PAGES_A.map(([id, label]) => (
              <DCArtboard
                key={"a-" + id}
                id={"a-" + id}
                label={label}
                width={1280}
                height={1600}
              >
                <Screen initialPage={id} w={1280} h={1600} />
              </DCArtboard>
            ))}
          </DCSection>

          <DCPostIt top={20} left={60} rotate={-2} width={260}>
            <b>Direction A · Gallery</b><br/>
            每個 artboard 都是可互動的真實頁面 — 點 nav / drawer / 卡片都可切換。<br/>
            按 ⤢ 圖示可全螢幕聚焦。
          </DCPostIt>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
