---
layout: default
---
<section class="list-hero">
  {% if page.eyebrow %}<div class="eyebrow">{{ page.eyebrow }}</div>{% endif %}
  <h1>{{ page.title }}</h1>
  {% if page.subtitle %}
    <div class="sub"><p>{{ page.subtitle }}</p></div>
  {% endif %}
</section>

<div class="post-shell">
  <div class="post-body" id="post-body">
    {{ content }}
  </div>
</div>
